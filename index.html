<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 提示詞產生器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
    line-height: 1.6;
  }
  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    padding: 36px 20px 30px;
    text-align: center;
  }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; }
  .header p { font-size: 14px; opacity: .85; margin-top: 6px; }
  .container { max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 22px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    margin-bottom: 16px;
  }
  .card label {
    display: block;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #333;
  }
  textarea {
    width: 100%;
    height: 100px;
    border: 1.5px solid #dde1e7;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    transition: border .2s;
    background: #fafbfc;
    color: #1a1a2e;
  }
  textarea:focus {
    outline: none;
    border-color: #667eea;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(102,126,234,.15);
  }
  textarea::placeholder { color: #aab; }
  .btn {
    display: block;
    width: 100%;
    padding: 14px 0;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    letter-spacing: 1px;
  }
  .btn:active { transform: scale(.97); opacity: .9; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 12px;
    background: #eef0ff;
    color: #667eea;
  }
  .result-card {
    display: none;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    overflow: hidden;
  }
  .result-card.visible { display: block; }
  .result-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-header h2 { font-size: 16px; font-weight: 600; }
  .copy-btn {
    background: rgba(255,255,255,.2);
    border: 1px solid rgba(255,255,255,.4);
    color: #fff;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background .2s;
    font-weight: 600;
  }
  .copy-btn:active { background: rgba(255,255,255,.35); }
  .copy-btn.copied { background: rgba(0,200,100,.4); border-color: rgba(0,200,100,.5); }
  .result-body {
    padding: 18px 20px;
    background: #f8f9ff;
  }
  .role-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
    background: #667eea;
    color: #fff;
    margin-bottom: 10px;
  }
  .result-text {
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
    color: #2d2d44;
    background: #fff;
    border-radius: 8px;
    padding: 14px 16px;
    border: 1px solid #e8ecf2;
    max-height: 400px;
    overflow-y: auto;
  }
  .status-msg {
    text-align: center;
    color: #888;
    font-size: 14px;
    padding: 8px 0;
  }
  .status-msg .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #667eea;
    margin-right: 6px;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }
  .footer {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 24px;
    padding-bottom: 20px;
  }
  .role-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 6px;
  }
  .role-btn {
    padding: 10px 4px;
    border-radius: 10px;
    border: 1.5px solid #dde1e7;
    background: #fafbfc;
    cursor: pointer;
    transition: all .15s;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    color: #444;
    font-family: inherit;
    line-height: 1.3;
  }
  .role-btn:hover { border-color: #667eea; color: #667eea; background: #f0f2ff; }
  .role-btn.selected { border-color: #667eea; background: #667eea; color: #fff; }
  .no-match-box {
    background: #fff4e5;
    border: 1px solid #ffe0a0;
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 12px;
    font-size: 14px;
    color: #8a6d00;
    display: none;
  }
  .no-match-box strong { display: block; margin-bottom: 4px; }
  @media (max-width: 480px) {
    .header h1 { font-size: 22px; }
    .container { padding: 16px 12px 30px; }
    .card { padding: 18px 16px; }
    .role-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .role-btn { font-size: 12px; padding: 8px 2px; }
    .result-header { flex-direction: column; gap: 8px; text-align: center; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>AI 提示詞產生器</h1>
  <p>選一個專業角色 + 輸入你的問題 = 產生專屬提示詞</p>
</div>

<div class="container">

  <div class="card">
    <label for="question">輸入你的問題</label>
    <textarea id="question" placeholder="例如：教我怎麼煎荷包蛋&#10;為什麼天是藍色的？&#10;想創業要怎麼開始？"></textarea>
    <div style="margin-top: 14px;">
      <label style="display:block; font-size:14px; font-weight:600; color:#333; margin-bottom:2px;">選擇專業角色</label>
      <div class="role-grid" id="roleGrid"></div>
    </div>
    <div class="no-match-box" id="noMatchBox">
      <strong>沒有這個功能</strong>
      這裡只支援 15 個固定專業角色。你的問題不在這些範圍內的話，請重新選擇一個接近的角色，或調整你的問題方向。
    </div>
    <div style="margin-top: 14px;">
      <button class="btn" id="generateBtn">產生提示詞</button>
    </div>
    <div id="status" class="status-msg" style="display:none;">
      <span class="dot"></span> 產生中...
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <h2>產生的提示詞</h2>
      <button class="copy-btn" id="copyBtn">複製提示詞</button>
    </div>
    <div class="result-body">
      <div id="roleBadge" class="role-badge"></div>
      <div id="resultText" class="result-text"></div>
    </div>
  </div>

  <div class="footer">純前端離線運作 · 不需網路 · 不需 API Key</div>
</div>

<script>
const roles = [
  { id: "cook",        name: "料理",   role: "廚房老手", bio: "做菜做了大半輩子，從家常小炒到宴客大菜都難不倒。最喜歡教人，看到學生從不會到會，比吃到好吃的東西還開心。", instruction: "請以一位廚房老手的口吻回答，講話要有人情味。把對方當作完全沒下過廚的新手，一步步說清楚：需要準備什麼、每一步怎麼做、為什麼要這樣做。哪些地方容易失敗要特別提醒，有沒有偷吃步的撇步也不藏私。" },
  { id: "programmer",  name: "程式開發", role: "程式老鳥", bio: "寫程式寫了十幾年，debug的經驗比寫code還多。看過程式新手最常踩的坑，也看過很多自以為很厲害結果寫出炸彈的案例。", instruction: "請以一位資深程式設計師的口吻回答，講話直接不囉嗦。用清楚的方式解釋核心概念，給出具體的實作步驟和程式碼範例。哪些地方最容易踩雷要特別講，最佳實踐和常見的坑都要提。" },
  { id: "science",     name: "科學",   role: "科學老師", bio: "最喜歡把複雜的科學原理講到連阿嬤都聽得懂。教了快二十年，發現學生聽不懂通常不是笨，是老師不會講。", instruction: "請以一位科學老師的口吻回答，要擅長用生活化的比喻來解釋抽象概念。先講核心原理，再用大家熟悉的例子幫助理解，最後補充常見的誤解。不要用太多艱澀的術語，如果非用不可，一定要解釋。" },
  { id: "doctor",      name: "醫療",   role: "家醫科醫師", bio: "看診十幾年，最怕病人亂信網路偏方。不管大病小病，都習慣先聽病人講完，再好好解釋。", instruction: "請以一位家庭醫師的口吻回答，態度溫暖謹慎。先說明可能的原因，再給具體的處理建議，什麼時候應該去看醫生要講清楚。請注意：僅供參考，不能取代實際醫療診斷。" },
  { id: "psychologist",name: "心理",   role: "心理師", bio: "聽過幾千個人的故事，知道人心的柔軟與堅強。不會跟你說教，只會引導你自己找到答案。", instruction: "請以一位心理師的口吻回答，語氣溫柔、接納、不批判。先同理對方的感受，再從心理學的角度解釋可能的原因，最後給出具體可行的建議或練習方向。" },
  { id: "business",    name: "創業",   role: "創業老司機", bio: "創過業也倒過閉，繳過的學費比你的薪水還多。不會跟你畫大餅，只講真實的經驗。", instruction: "請以一位創業多年的前輩口吻回答，講話務實不浮誇。給出具體的策略與執行步驟，哪些地方是坑要講清楚。最好能舉實際案例，成功和失敗的經驗都談。" },
  { id: "designer",    name: "設計",   role: "設計人", bio: "玩了十幾年設計，美感就是從不斷踩雷中練出來的。沒什麼天不天分，只有願不願意動手。", instruction: "請以一位資深設計師的口吻回答，語氣輕鬆但有料。說明設計原則與概念，給出具體的操作方法和技巧。工具怎麼選、顏色怎麼配、常見的初學者錯誤都要提到。" },
  { id: "musician",    name: "音樂",   role: "音樂人", bio: "玩音樂玩了大半輩子，從街頭唱到國家音樂廳。學音樂沒有捷徑，但可以少走很多冤枉路。", instruction: "請以一位音樂人的口吻回答，說話要有節奏感。給出具體的練習方法與技巧，從基本功到進階都說明。常見的學習瓶頸和怎麼突破要講。" },
  { id: "coach",       name: "健身",   role: "體能教練", bio: "帶過的學生從阿嬤到國手都有。運動這條路沒有奇蹟，只有累積。安全第一，效果自然會來。", instruction: "請以一位體能教練的口吻回答，要給人激勵又很踏實的感覺。先講正確動作與姿勢，再給訓練計畫建議。哪些動作容易受傷要特別提醒，初學者常見的錯誤要講清楚。" },
  { id: "lawyer",      name: "法律",   role: "律師", bio: "打過上百場官司，看過人性最真實的一面。法律不是拿來嚇人的，是拿來保護自己的。", instruction: "請以一位律師的口吻回答，語氣嚴謹但不嚇人。先分析相關的法律權益與義務，再說明具體的處理步驟。哪些事情要趕快做、哪些證據要保留，都要講清楚。請注意：僅供參考，具體案情建議諮詢專業律師。" },
  { id: "finance",     name: "理財",   role: "財務顧問", bio: "幫人管錢管了快二十年，看過太多人把錢亂花。理財沒有捷徑，但觀念對了就贏一半。", instruction: "請以一位財務顧問的口吻回答，講話務實不畫大餅。先說明核心財務概念，再給具體的執行策略。風險評估要講清楚，哪些產品適合什麼樣的人也要說明。請注意：投資有風險。" },
  { id: "teacher",     name: "教育",   role: "老師", bio: "站在講台前二十年，看過無數學生從不會到會。每個人開竅的時間不一樣，用對方法比用功更重要。", instruction: "請以一位老師的口吻回答，語氣耐心又有條理。先講核心的學習觀念，再給具體的讀書方法和技巧。時間怎麼安排、筆記怎麼做、考試怎麼準備都要說清楚。" },
  { id: "photographer",name: "攝影",   role: "攝影師", bio: "拍了十幾年，從底片時代拍到手機時代。好照片不是器材的問題，是你有沒有看到那一瞬間。", instruction: "請以一位攝影師的口吻回答，語氣輕鬆有畫面。先講拍攝設定與技巧，再談構圖與光線。設備怎麼選、常見的拍攝錯誤怎麼避免都要提到。" },
  { id: "writer",      name: "寫作",   role: "寫作人", bio: "靠筆吃飯吃了二十年，寫過小說也寫過文案。靈感不是天上掉下來的，是每天坐在書桌前逼出來的。", instruction: "請以一位作家的口吻回答，語氣有感染力。給出具體的寫作方法與練習技巧，從靈感發想到結構安排都說明。寫作瓶頸要怎麼突破、怎樣建立寫作習慣都要講。" },
  { id: "vet",         name: "寵物",   role: "獸醫師", bio: "貓狗鳥兔老鼠都看過，毛小孩的健康就是我的責任。養寵物就像養小孩，要用對方法。", instruction: "請以一位獸醫師的口吻回答，語氣專業但溫柔。先說明可能的原因，再給具體的照護建議。飲食、生活習慣要注意的地方要講清楚，什麼時候該帶去看醫生也要說明。" },
];

let selectedRole = null;
let currentPrompt = '';

const questionInput = document.getElementById('question');
const generateBtn = document.getElementById('generateBtn');
const statusEl = document.getElementById('status');
const resultCard = document.getElementById('resultCard');
const roleBadge = document.getElementById('roleBadge');
const resultText = document.getElementById('resultText');
const copyBtn = document.getElementById('copyBtn');
const roleGrid = document.getElementById('roleGrid');
const noMatchBox = document.getElementById('noMatchBox');

roles.forEach(r => {
  const btn = document.createElement('button');
  btn.className = 'role-btn';
  btn.textContent = r.role;
  btn.dataset.id = r.id;
  btn.addEventListener('click', function() {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
    this.classList.add('selected');
    selectedRole = r;
    noMatchBox.style.display = 'none';
  });
  roleGrid.appendChild(btn);
});

generateBtn.addEventListener('click', function() {
  const q = questionInput.value.trim();

  if (!q) {
    questionInput.focus();
    questionInput.style.borderColor = '#e74c3c';
    setTimeout(() => { questionInput.style.borderColor = ''; }, 800);
    return;
  }

  if (!selectedRole) {
    noMatchBox.innerHTML = '<strong>請先選擇一個角色</strong>從上方 15 個專業角色中點選一個，再按產生提示詞。';
    noMatchBox.style.display = 'block';
    return;
  }

  generateBtn.disabled = true;
  statusEl.style.display = 'block';
  resultCard.classList.remove('visible');
  noMatchBox.style.display = 'none';

  setTimeout(() => {
    const r = selectedRole;
    const badge = `${r.role} · ${r.name}`;
    const text = `你是一位${r.role}。${r.bio}

現在有人這樣問你：

「${q}」

${r.instruction}

回答時請使用繁體中文。開始吧：`;

    currentPrompt = text;
    roleBadge.textContent = badge;
    resultText.textContent = text;
    resultCard.classList.add('visible');

    generateBtn.disabled = false;
    statusEl.style.display = 'none';
    copyBtn.textContent = '複製提示詞';
    copyBtn.classList.remove('copied');
  }, 200);
});

copyBtn.addEventListener('click', function() {
  if (!currentPrompt) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(currentPrompt).then(() => {
      copyBtn.textContent = '已複製 ✓';
      copyBtn.classList.add('copied');
    }).catch(() => fallbackCopy());
  } else { fallbackCopy(); }
});

function fallbackCopy() {
  const ta = document.createElement('textarea');
  ta.value = currentPrompt;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); copyBtn.textContent = '已複製 ✓'; copyBtn.classList.add('copied'); }
  catch(e) { alert('無法複製，請手動選取文字複製'); }
  document.body.removeChild(ta);
}

questionInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) generateBtn.click();
});
</script>
</body>
</html>
