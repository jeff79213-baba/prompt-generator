<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; }
  .header p { font-size: 14px; opacity: .85; margin-top: 6px; }
  .container { max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }

    background: #fff;
    border-radius: 14px;
    padding: 22px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    margin-bottom: 16px;
  }
  .card label {
    display: block;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #333;
  }
  textarea {
    width: 100%;
    height: 100px;
    border: 1.5px solid #dde1e7;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    transition: border .2s;
    background: #fafbfc;
    color: #1a1a2e;
  }
  textarea:focus {
    outline: none;
    border-color: #667eea;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(102,126,234,.15);
  }
  textarea::placeholder { color: #aab; }
  .btn {
    display: block;
    width: 100%;
    padding: 14px 0;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    letter-spacing: 1px;
  }
  .btn:active { transform: scale(.97); opacity: .9; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 12px;
    background: #eef0ff;
    color: #667eea;
  }
  .result-card {
    display: none;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    overflow: hidden;
  }
  .result-card.visible { display: block; }
  .result-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-header h2 { font-size: 16px; font-weight: 600; }
  .copy-btn {
    background: rgba(255,255,255,.2);
    border: 1px solid rgba(255,255,255,.4);
    color: #fff;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background .2s;
    font-weight: 600;
  }
  .copy-btn:active { background: rgba(255,255,255,.35); }
  .copy-btn.copied { background: rgba(0,200,100,.4); border-color: rgba(0,200,100,.5); }
  .result-body {
    padding: 18px 20px;
    background: #f8f9ff;
  }
  .role-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
    background: #667eea;
    color: #fff;
    margin-bottom: 10px;
  }
  .result-text {
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
    color: #2d2d44;
    background: #fff;
    border-radius: 8px;
    padding: 14px 16px;
    border: 1px solid #e8ecf2;
    max-height: 400px;
    overflow-y: auto;

    text-align: center;
    color: #888;
    font-size: 14px;
    padding: 8px 0;
  }

    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #667eea;
    margin-right: 6px;
    animation: pulse 1s ease-in-out infinite;

    0%, 100% { opacity: 1; }

    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 24px;
    padding-bottom: 20px;

    .header h1 { font-size: 22px; }
    .container { padding: 16px 12px 30px; }

</div>

<div class="container">

    <div style="margin-top: 12px;">
      <button class="btn" id="generateBtn">產生提示詞</button>
    </div>
    <div id="status" class="status-msg" style="display:none;">
      <span class="dot"></span> 分析問題中...
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <h2>產生的提示詞</h2>
      <button class="copy-btn" id="copyBtn">複製提示詞</button>
    </div>
    <div class="result-body">
      <div id="roleBadge" class="role-badge"></div>
      <div id="resultText" class="result-text"></div>
    </div>
  </div>

  <div class="footer">純前端離線運作 · 不需網路 · 不需 API Key</div>
</div>

function analyzeQuestion(question) {
  const q = question.toLowerCase();
  const scores = [];

  for (const domain of domains) {
    let score = 0;
    for (const kw of domain.keywords) {
      if (q.includes(kw.toLowerCase())) {
        score++;
      }
    }
    if (score > 0) {
      scores.push({ domain, score });
    }
  }

  if (scores.length === 0) {
    return null;
  }

  scores.sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return b.domain.keywords.length - a.domain.keywords.length;
  });

  return scores[0].domain;
}

function generatePrompt(question, domain) {
  if (!domain) {
    return {
      role: "通才",
      badge: "通才 · 各種領域都略懂略懂",
      text: `你的問題我還在抓方向，先請一位通才來幫你。

你是一位知識廣泛的通才，擅長用清楚的方式回答各種問題。現在有人問你：

「${question}」

請用繁體中文回答，條理清楚、舉例說明。如果你覺得這個問題屬於某個專業領域，請在回答中建議對方找該領域的專家深入詢問。`
    };
  }

  const badge = `${domain.role} · ${domain.name}`;

  const text = `你是一位${domain.role}。${domain.bio}

現在有人這樣問你：

「${question}」

${domain.instruction}

回答時請使用繁體中文。開始吧：`;

  const plainText = `你是一位${domain.role}。${domain.bio}

現在有人這樣問你：

「${question}」

${domain.instruction}

回答時請使用繁體中文。開始吧：`;

  return { role: domain.role, badge, text: plainText };
}

const questionInput = document.getElementById('question');
const generateBtn = document.getElementById('generateBtn');
const statusEl = document.getElementById('status');
const resultCard = document.getElementById('resultCard');
const roleBadge = document.getElementById('roleBadge');
const resultText = document.getElementById('resultText');
const copyBtn = document.getElementById('copyBtn');

let currentPrompt = '';

generateBtn.addEventListener('click', function() {
  const q = questionInput.value.trim();
  if (!q) {
    questionInput.focus();
    questionInput.style.borderColor = '#e74c3c';
    setTimeout(() => { questionInput.style.borderColor = ''; }, 800);
    return;
  }

  generateBtn.disabled = true;
  statusEl.style.display = 'block';
  resultCard.classList.remove('visible');

  setTimeout(() => {
    const domain = analyzeQuestion(q);
    const result = generatePrompt(q, domain);
    currentPrompt = result.text;

    roleBadge.textContent = result.badge;
    resultText.textContent = result.text;
    resultCard.classList.add('visible');

    generateBtn.disabled = false;
    statusEl.style.display = 'none';
    copyBtn.textContent = '複製提示詞';
    copyBtn.classList.remove('copied');
  }, 400);
});

copyBtn.addEventListener('click', function() {
  if (!currentPrompt) return;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(currentPrompt).then(() => {
      copyBtn.textContent = '已複製 ✓';
      copyBtn.classList.add('copied');
    }).catch(() => {
      fallbackCopy();
    });
  } else {
    fallbackCopy();
  }
});

function fallbackCopy() {
  const textarea = document.createElement('textarea');
  textarea.value = currentPrompt;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    copyBtn.textContent = '已複製 ✓';
    copyBtn.classList.add('copied');
  } catch (e) {
    alert('無法複製，請手動選取文字複製');
  }
  document.body.removeChild(textarea);
}

questionInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) {
    generateBtn.click();
  }
});
