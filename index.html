<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">

<title>荒野亂鬥 全英雄圖鑑</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    background:#0f1923;color:#e0e0e0;min-height:100vh;line-height:1.5;padding-bottom:60px
  }
  .header{
    background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
    color:#fff;padding:40px 16px 24px;text-align:center;position:sticky;top:0;z-index:100
  }
  .header h1{font-size:22px;font-weight:700;letter-spacing:1px}
  .header p{font-size:13px;opacity:.7;margin-top:4px}
  .search-bar{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .search-bar input{
    flex:1;min-width:140px;max-width:320px;padding:10px 14px;border-radius:10px;
    border:1.5px solid #2a3a4e;background:#1a2a3e;color:#e0e0e0;
    font-size:14px;outline:none;transition:border .2s
  }
  .search-bar input:focus{border-color:#4a8af4}
  .search-bar input::placeholder{color:#6a7a8e}
  .filter-group{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}
  .filter-btn{
    padding:4px 12px;border-radius:20px;border:1px solid #2a3a4e;
    background:transparent;color:#8a9aae;font-size:12px;cursor:pointer;transition:all .2s
  }
  .filter-btn.active{background:#4a8af4;border-color:#4a8af4;color:#fff}
  .filter-btn:hover{background:#2a3a4e}
  .container{max-width:640px;margin:0 auto;padding:16px 12px 40px}
  .rarity-section{margin-bottom:20px}
  .rarity-title{
    font-size:16px;font-weight:700;padding:8px 12px;border-radius:8px;margin-bottom:8px;
    display:flex;align-items:center;gap:8px
  }
  .rarity-count{font-size:12px;font-weight:400;opacity:.6;margin-left:auto}
  .rarity-Starting{background:linear-gradient(135deg,#4a4a4a,#6a6a6a)}
  .rarity-Rare{background:linear-gradient(135deg,#2d6a2d,#4a9a4a)}
  .rarity-SuperRare{background:linear-gradient(135deg,#2a5a8a,#4a8ad4)}
  .rarity-Epic{background:linear-gradient(135deg,#6a2a8a,#9a4ad4)}
  .rarity-Mythic{background:linear-gradient(135deg,#8a4a1a,#d47a2a)}
  .rarity-Legendary{background:linear-gradient(135deg,#8a6a1a,#d4aa2a)}
  .rarity-Chromatic{background:linear-gradient(135deg,#1a6a6a,#2aaaaa)}
  .brawler-card{
    background:#1a2a3e;border-radius:10px;margin-bottom:6px;overflow:hidden;
    transition:all .2s;border:1px solid #2a3a4e
  }
  .brawler-card.hidden{display:none}
  .brawler-header{
    display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;
    -webkit-tap-highlight-color:transparent;user-select:none
  }
  .brawler-header:active{background:#1e3046}
  .brawler-icon{
    width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:18px;flex-shrink:0
  }
  .brawler-name{font-size:14px;font-weight:600;flex:1}
  .brawler-name .en{font-size:11px;font-weight:400;opacity:.5;margin-left:4px}
  .brawler-class{
    font-size:11px;padding:2px 8px;border-radius:10px;background:#2a3a4e;
    color:#8a9aae;white-space:nowrap
  }
  .brawler-toggle{color:#6a7a8e;font-size:12px;transition:transform .2s;flex-shrink:0}
  .brawler-card.open .brawler-toggle{transform:rotate(180deg)}
  .brawler-body{display:none;padding:0 12px 12px;border-top:1px solid #2a3a4e;margin-top:0}
  .brawler-card.open .brawler-body{display:block}
  .brawler-body p{font-size:13px;margin:6px 0;line-height:1.6}
  .brawler-body .label{color:#6a8ab4;font-weight:600;font-size:12px}
  .brawler-body .tag{
    display:inline-block;font-size:11px;padding:2px 8px;border-radius:8px;margin:2px 2px 2px 0
  }
  .tag-attack{background:#2a4a3a;color:#6ada6a}
  .tag-super{background:#4a2a3a;color:#da6a6a}
  .tag-tip{background:#2a3a4a;color:#8ab4da}
  .empty-state{text-align:center;padding:40px 16px;color:#6a7a8e;font-size:14px;display:none}
  .footer{text-align:center;padding:20px;color:#4a5a6e;font-size:12px}
</style>
</head>

const rarityOrder=["Starting","Rare","SuperRare","Epic","Mythic","Legendary","Chromatic"];
const rarityNames={Starting:"初始英雄",Rare:"稀有",SuperRare:"超稀有",Epic:"史詩",Mythic:"神話",Legendary:"傳奇",Chromatic:"流彩"};
const container=document.getElementById("brawlerContainer");
function render(){
  let html="";
  for(const r of rarityOrder){
    const list=brawlers.filter(b=>b.rarity===r);
    if(!list.length)continue;
    html+=`<div class="rarity-section" data-rarity="${r}"><div class="rarity-title rarity-${r}">${rarityNames[r]}<span class="rarity-count">${list.length} 位</span></div>`;
    for(const b of list){
      const c=[{r:"Starting",c:"#6a6a6a"},{r:"Rare",c:"#4a9a4a"},{r:"SuperRare",c:"#4a8ad4"},{r:"Epic",c:"#9a4ad4"},{r:"Mythic",c:"#d47a2a"},{r:"Legendary",c:"#d4aa2a"},{r:"Chromatic",c:"#2aaaaa"}].find(x=>x.r===b.rarity)||{c:"#6a6a6a"};
      html+=`<div class="brawler-card class-${b.class}" data-class="${b.class}" data-name="${b.name}${b.en}">`;
      html+=`<div class="brawler-header" onclick="this.closest('.brawler-card').classList.toggle('open')">`;
      html+=`<div class="brawler-icon" style="background:${c.c}">${b.emoji}</div>`;
      html+=`<div class="brawler-name">${b.name}<span class="en">${b.en}</span></div>`;
      html+=`<span class="brawler-class">${b.class}</span><span class="brawler-toggle">▼</span></div>`;
      html+=`<div class="brawler-body"><p><span class="label tag tag-attack">普攻</span> ${b.atk}</p>`;
      html+=`<p><span class="label tag tag-super">大招</span> ${b.super}</p>`;
      html+=`<p><span class="label tag tag-tip">玩法</span> ${b.tip}</p></div></div>`;
    }
    html+=`</div>`;
  }
  container.innerHTML=html;
}
function filterBrawlers(){
  const q=document.getElementById("searchInput").value.toLowerCase().trim();
  const ac=document.querySelector(".filter-btn.active")?.dataset.class||"all";
  const cards=document.querySelectorAll(".brawler-card");
  const secs=document.querySelectorAll(".rarity-section");
  let any=false;
  cards.forEach(c=>{
    const n=c.dataset.name?.toLowerCase()||"";
    const cl=c.dataset.class||"";
    const mc=ac==="all"||cl===ac;
    const ms=!q||n.includes(q);
    c.classList.toggle("hidden",!(mc&&ms));
    if(!(mc&&ms))c.classList.remove("open");
    if(!c.classList.contains("hidden"))any=true;
  });
  secs.forEach(s=>{s.style.display=[...s.querySelectorAll(".brawler-card")].some(c=>!c.classList.contains("hidden"))?"":"none"});
  document.getElementById("emptyState").style.display=any?"none":"block";
}
function filterClass(cls){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.class===cls));
  filterBrawlers();
}
render();
</script>
